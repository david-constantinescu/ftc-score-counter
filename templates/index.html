<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTC DECODE TALLY 2024</title>
    <style>
        :root {
            --bg-dark: #0f0f23;
            --bg-panel: #1a1a2e;
            --accent-blue: #007acd;
            --accent-red: #cd0032;
            --text-light: #e0e0e0;
            --text-muted: #888888;
            --border-color: #2a2a40;
            --button-bg: #2b2b45;
            --button-hover: #3d3d60;
            --font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background-color: var(--bg-panel);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
            color: #ffffff;
            font-weight: 600;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-msg {
            font-size: 14px;
            color: #27ae60;
        }
        .status-msg.error { color: #e74c3c; }

        .timer-display {
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            color: #f1c40f;
            background: #000;
            padding: 5px 15px;
            border-radius: 5px;
            border: 1px solid #333;
            min-width: 80px;
            text-align: center;
        }

        .main-content {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        .side-panel {
            flex: 1;
            background-color: var(--bg-panel);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .side-panel.blue { border-color: var(--accent-blue); }
        .side-panel.red { border-color: var(--accent-red); }

        .panel-header {
            padding: 10px 15px;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            color: white;
        }
        .side-panel.blue .panel-header { background-color: var(--accent-blue); }
        .side-panel.red .panel-header { background-color: var(--accent-red); }

        .controls {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .select-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .select-group select {
            flex: 1;
            background: var(--button-bg);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 5px;
            font-size: 14px;
            outline: none;
        }
        .select-group select:focus { border-color: var(--text-muted); }

        .video-container {
            flex: 1;
            background-color: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-bottom: 1px solid var(--border-color);
            min-height: 240px;
        }
        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .scoring-section {
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
            background-color: var(--bg-panel);
        }

        .score-display {
            font-size: 64px;
            font-weight: bold;
            font-family: monospace;
            margin: 0;
            line-height: 1;
        }
        .side-panel.blue .score-display { color: var(--accent-blue); }
        .side-panel.red .score-display { color: var(--accent-red); }

        .live-count {
            font-size: 14px;
            color: var(--text-muted);
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            background-color: var(--button-bg);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background-color: var(--button-hover);
        }
        button:active {
            transform: scale(0.98);
        }
        button.danger { color: #ff6b6b; border-color: #552222; }
        button.danger:hover { background-color: #441111; }
        button.primary { background-color: #27ae60; color: white; border-color: #2ecc71; }
        button.primary:hover { background-color: #2ecc71; }

        .footer {
            background-color: var(--bg-panel);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>FTC DECODE SCORE</h1>
        <div class="status-container">
            <span id="statusMsg" class="status-msg">Loading...</span>
            <div id="timerDisplay" class="timer-display">2:30</div>
            <button onclick="postAction('toggle_timer')" class="primary">Play/Pause</button>
            <button onclick="postAction('reset_timer')">Reset Timer</button>
            <button onclick="postAction('reset_all')" class="danger">Reset Match</button>
            <button onclick="postAction('refresh_cams')">Scan Cams</button>
        </div>
    </div>

    <div class="main-content">
        <!-- BLUE PANEL -->
        <div class="side-panel blue">
            <div class="panel-header">BLUE ALLIANCE</div>
            <div class="controls">
                <div class="select-group">
                    <label>Camera:</label>
                    <select id="blueCamSelect" onchange="postAction('set_cam', 'blue', this.value)">
                        <option value="">Loading...</option>
                    </select>
                </div>
            </div>
            <div class="video-container">
                <img src="/video_feed/blue" id="blueVid" alt="No Blue Camera Feed">
            </div>
            <div class="scoring-section">
                <div id="blueScore" class="score-display">0</div>
                <div id="blueLive" class="live-count">Live View in Frame: 0</div>
                <div class="button-row">
                    <button onclick="postAction('manual_add', 'blue')">+1 Score</button>
                    <button onclick="postAction('manual_sub', 'blue')">-1 Score</button>
                    <button class="danger" onclick="postAction('clear_side', 'blue')">Clear</button>
                </div>
            </div>
        </div>

        <!-- RED PANEL -->
        <div class="side-panel red">
            <div class="panel-header">RED ALLIANCE</div>
            <div class="controls">
                <div class="select-group">
                    <label>Camera:</label>
                    <select id="redCamSelect" onchange="postAction('set_cam', 'red', this.value)">
                        <option value="">Loading...</option>
                    </select>
                </div>
            </div>
            <div class="video-container">
                <img src="/video_feed/red" id="redVid" alt="No Red Camera Feed">
            </div>
            <div class="scoring-section">
                <div id="redScore" class="score-display">0</div>
                <div id="redLive" class="live-count">Live View in Frame: 0</div>
                <div class="button-row">
                    <button onclick="postAction('manual_add', 'red')">+1 Score</button>
                    <button onclick="postAction('manual_sub', 'red')">-1 Score</button>
                    <button class="danger" onclick="postAction('clear_side', 'red')">Clear</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <span>AI Scoring System (YOLOv8 + HSV Centroid Tracking) Flask backend</span>
        <span id="fpsDisplay">FPS: 0.0</span>
    </div>

    <script>
        let availableCameras = [];
        let pollingInterval = null;

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        async function fetchState() {
            try {
                const res = await fetch('/api/state');
                const data = await res.json();
                
                // Update text
                document.getElementById('blueScore').innerText = data.blue_hw;
                document.getElementById('redScore').innerText = data.red_hw;
                document.getElementById('blueLive').innerText = `Live View in Frame: ${data.blue_live}`;
                document.getElementById('redLive').innerText = `Live View in Frame: ${data.red_live}`;
                document.getElementById('timerDisplay').innerText = formatTime(data.timer_seconds);
                document.getElementById('fpsDisplay').innerText = `FPS: ${data.fps.toFixed(1)}`;
                
                const statusEl = document.getElementById('statusMsg');
                statusEl.innerText = data.status_msg;
                statusEl.className = data.status_ok ? 'status-msg' : 'status-msg error';

                // Check for camera refresh needed
                if (JSON.stringify(availableCameras) !== JSON.stringify(data.cameras)) {
                    availableCameras = data.cameras;
                    
                    const updateSelect = (id, curVal) => {
                        const sel = document.getElementById(id);
                        sel.innerHTML = '';
                        let found = false;
                        for (let c of availableCameras) {
                            const opt = document.createElement('option');
                            opt.value = c;
                            opt.innerText = c;
                            if (c === curVal) {
                                opt.selected = true;
                                found = true;
                            }
                            sel.appendChild(opt);
                        }
                        if (!found && curVal && availableCameras.length > 0) {
                             sel.value = availableCameras[0];
                        }
                    };
                    updateSelect('blueCamSelect', data.blue_cam_val);
                    updateSelect('redCamSelect', data.red_cam_val);
                } else {
                    // Only update selection if the element is NOT focused, to avoid fighting user input
                    const bd = document.getElementById('blueCamSelect');
                    if (document.activeElement !== bd && bd.value !== data.blue_cam_val && data.blue_cam_val) {
                         bd.value = data.blue_cam_val;
                    }
                    const rd = document.getElementById('redCamSelect');
                    if (document.activeElement !== rd && rd.value !== data.red_cam_val && data.red_cam_val) {
                         rd.value = data.red_cam_val;
                    }
                }

            } catch (err) {
                console.error("Failed to fetch state", err);
            }
        }

        async function postAction(action, side=null, val=null) {
            try {
                await fetch('/api/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, side, val })
                });
                fetchState(); // Immediate UI update
            } catch (err) {
                console.error("Failed to post action", err);
            }
        }

        // Poll state repeatedly to be extremely responsive
        pollingInterval = setInterval(fetchState, 150);
        
        // Initial manual poll
        fetchState();
    </script>
</body>
</html>
