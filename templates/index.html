<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTC Goal Scorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;background:#000;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* Background image can be set on .scoreboard */
.scoreboard {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  background: url('/static/bg.jpg') center/cover no-repeat; /* Example if you have a bg */
}

/* TOP ROW */
.top-row {
  display: flex;
  height: 60vh;
  position: relative;
  align-items: center;
  justify-content: center;
  padding: 0 4vw;
}

.alliance-huge {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 1vw 2vw;
  box-shadow: 0px 4px 15px rgba(0,0,0,0.6);
}
.alliance-huge.red { background: #d32f2f; margin-right: -2vw; z-index: 1;}
.alliance-huge.blue { background: #1976d2; margin-left: -2vw; z-index: 1;}

.team-numbers {
  display: none;
  font-size: 3vw;
  font-weight: 700;
  color: #fff;
  letter-spacing: 2px;
}
.team-numbers.visible { display: flex; flex-direction: column; align-items: center; }

.huge-score {
  font-size: 15vw;
  font-weight: 800;
  line-height: 1;
}

/* TIMER */
.huge-timer-box {
  background: #fff;
  color: #000;
  font-size: 20vw;
  font-weight: 800;
  padding: 2vw 4vw;
  z-index: 10;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  font-variant-numeric: tabular-nums;
  line-height: 0.9;
  text-align: center;
}
.huge-timer-box.danger { color: #d32f2f; }

/* BOTTOM ROW (LOWER THIRDS) */
.bottom-thirds {
  display: flex;
  height: 15vh;
  background: #fff;
  border-top: 4px solid #fff;
}
.third {
  display: flex;
  align-items: center;
}
.third.logos { flex: 0.5; background: #fff; justify-content: center; }
.third.red-info { flex: 1; background: #9c0000; color: #fff; }
.third.blue-info { flex: 1; background: #004c99; color: #fff; }
.third.center-info { flex: 0.5; background: #fff; color: #000; flex-direction: column; justify-content: center; font-weight: 800; font-size: 2vw;}

.bottom-box {
  background: #fff;
  color: #000;
  height: 80%;
  margin: 0 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
  font-size: 2.5vw;
  font-weight: bold;
}
.icon-p { font-size: 3vw; margin-right: 15px; }

/* STUFF */
.timer-sm { font-size: 4vw; border: 2px solid #000; padding: 0 1vw; border-radius: 5px; cursor: pointer; }
.motifs { display: flex; gap: 5px; margin-top: 5px;}
.mot { width: 1.5vw; height: 1.5vw; border-radius: 50%; opacity: 0.5; cursor: pointer;}
.mot.g { background: #4caf50; opacity: 1; }
.mot.p { background: #9c27b0; opacity: 1; }
.mot.w { background: #fff; border: 1px solid #ccc; opacity: 1; }

/* Control area hidden / toggled */
.controls-bottom {
  background: #1a1a2e;
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid #333;
}
.control-group { display: flex; gap: 8px; align-items: center; }

button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;transition:opacity .15s}
button:hover{opacity:.85}
button:active{opacity:.7}
.b-start{background:#4caf50;color:#fff}
.b-pause{background:#ff9800;color:#fff}
.b-reset{background:#616161;color:#fff}
.b-danger{background:#e53935;color:#fff}
.b-primary{background:#7c4dff;color:#fff}
.b-sm{padding:6px 12px;font-size:12px}

.vid-container {
  display: none;
  flex: 1;
  width: 100%;
  height: 100%;
  background: #000;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border-top: 4px solid #000;
}
.vid-container.visible { display: flex; }
.vid-container img { width: 100%; height: 100%; object-fit: contain; }

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#1a1a2e;border:1px solid #555;border-radius:12px;padding:24px;min-width:320px;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.8)}
.modal h2{margin:0 0 16px;font-size:18px;color:#fff}
.modal label{display:block;font-size:13px;margin-bottom:6px;color:#ccc}
.modal input{width:100%;padding:10px;border-radius:6px;border:1px solid #555;background:#0f0f23;color:#e0e0e0;font-size:14px;margin-bottom:14px}
.modal input[type="checkbox"] { width: auto; margin-right: 8px; }
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;}
</style>
</head>
<body>

<div class="scoreboard">

  <!-- PREVIEWS (hidden by default) -->
  <div style="display:flex; flex:1; height: 0;" id="previewRow">
    <div class="vid-container" id="redVid"><img id="redStream" src="/stream/red" alt="Red"></div>
    <div class="vid-container" id="blueVid"><img id="blueStream" src="/stream/blue" alt="Blue"></div>
  </div>

  <div class="top-row" id="topRow">
    <!-- Red Team -->
    <div class="alliance-huge red">
      <div class="team-numbers" id="redTeamsDisp">
        <span id="red1">252</span>
        <span id="red2">636</span>
      </div>
      <div class="huge-score" id="redScore">0</div>
      <div style="margin-top:10px;">
        <button class="b-reset b-sm" onclick="adj('red','minus')">-1</button>
        <button class="b-reset b-sm" onclick="adj('red','plus')">+1</button>
      </div>
    </div>
    
    <div class="huge-timer-box" id="timer">2:30</div>

    <!-- Blue Team -->
    <div class="alliance-huge blue">
      <div class="huge-score" id="blueScore">0</div>
      <div class="team-numbers" id="blueTeamsDisp">
        <span id="blue1">6152</span>
        <span id="blue2">15073</span>
      </div>
      <div style="margin-top:10px;">
        <button class="b-reset b-sm" onclick="adj('blue','minus')">-1</button>
        <button class="b-reset b-sm" onclick="adj('blue','plus')">+1</button>
      </div>
    </div>
  </div>

  <div class="bottom-thirds">
    <div class="third logos">
      <h2 style="color:#000; font-style:italic">FIRST</h2>
    </div>
    <div class="third red-info">
      <div style="display:flex;align-items:center;flex:1;justify-content:center;gap:15px;">
        <span class="icon-p">→</span>
        <div class="bottom-box">
          <span style="color:gray;">/36</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;">
          <span style="font-size:1.5vw;">Red</span>
          <span style="font-size:3.5vw;font-weight:bold" id="redBottom">0</span>
        </div>
      </div>
    </div>
    <div class="third center-info">
      <div>🤖</div>
      <div class="timer-sm" id="timerSmall">2:30</div>
      <div class="motifs" onclick="toggleMotif(event)">
        <div class="mot g"></div>
        <div class="mot p"></div>
        <div class="mot p"></div>
      </div>
    </div>
    <div class="third blue-info">
      <div style="display:flex;align-items:center;flex:1;justify-content:center;gap:15px;">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <span style="font-size:1.5vw;">Blue</span>
          <span style="font-size:3.5vw;font-weight:bold" id="blueBottom">0</span>
        </div>
        <div class="bottom-box">
          <span class="icon-p">→</span>
          <span style="color:gray;">/36</span>
        </div>
      </div>
    </div>
    <div class="third logos">
      <h2 style="color:#000; font-style:italic">DECODE</h2>
    </div>
  </div>
</div>

<div class="controls-bottom">
  <div class="control-group">
    <button class="b-start" onclick="timerStart()">Start</button>
    <button class="b-pause" onclick="timerPause()">Pause</button>
    <button class="b-reset" onclick="timerReset()">Reset Timer</button>
    <button class="b-danger" onclick="resetAll()">Reset Match</button>
  </div>
  <div class="control-group">
    <button class="b-primary" onclick="togglePreviewsBtn()">Toggle Previews</button>
    <button class="b-primary" onclick="openTeamModal()">Teams Settings</button>
  </div>
</div>

<!-- Team Settings Modal -->
<div class="modal-overlay" id="teamModal">
  <div class="modal">
    <h2>Teams Configuration</h2>
    <label style="display:flex;align-items:center;cursor:pointer;">
      <input type="checkbox" id="showTeamsCheck"> Show Teams on Scoreboard
    </label>
    <div style="margin-top:15px;display:flex;gap:15px">
      <div style="flex:1">
        <label style="color:#ef5350">Red Team 1</label>
        <input type="text" id="inputRed1" value="252">
        <label style="color:#ef5350">Red Team 2</label>
        <input type="text" id="inputRed2" value="636">
      </div>
      <div style="flex:1">
        <label style="color:#42a5f5">Blue Team 1</label>
        <input type="text" id="inputBlue1" value="6152">
        <label style="color:#42a5f5">Blue Team 2</label>
        <input type="text" id="inputBlue2" value="15073">
      </div>
    </div>
    <div class="modal-btns">
      <button class="b-reset" onclick="closeTeamModal()">Cancel</button>
      <button class="b-primary" onclick="saveTeamSettings()">Save</button>
    </div>
  </div>
</div>

<script>
let previewsVisible = false;

// Motifs sequence
const motifs = ['g', 'p', 'w'];
let mStates = [0, 1, 1]; // g, p, p

function toggleMotif(e) {
  if (e.target.classList.contains('mot')) {
    const parent = e.target.parentElement;
    const index = Array.from(parent.children).indexOf(e.target);
    mStates[index] = (mStates[index] + 1) % motifs.length;
    e.target.className = 'mot ' + motifs[mStates[index]];
  }
}

function togglePreviewsBtn() {
  previewsVisible = !previewsVisible;
  const rv = document.getElementById('redVid');
  const bv = document.getElementById('blueVid');
  const topRow = document.getElementById('topRow');
  const timer = document.getElementById('timer');
  const pr = document.getElementById('previewRow');

  if (previewsVisible) {
    rv.classList.add('visible');
    bv.classList.add('visible');
    topRow.style.height = '15vh';
    timer.style.padding = '0.5vw 2vw';
    timer.style.fontSize = '8vw';
    pr.style.height = 'auto';
  } else {
    rv.classList.remove('visible');
    bv.classList.remove('visible');
    topRow.style.height = '60vh';
    timer.style.padding = '2vw 4vw';
    timer.style.fontSize = '20vw';
    pr.style.height = '0';
  }
}

function openTeamModal() { document.getElementById('teamModal').classList.add('open'); }
function closeTeamModal() { document.getElementById('teamModal').classList.remove('open'); }
function saveTeamSettings() {
  const show = document.getElementById('showTeamsCheck').checked;
  const r1 = document.getElementById('inputRed1').value;
  const r2 = document.getElementById('inputRed2').value;
  const b1 = document.getElementById('inputBlue1').value;
  const b2 = document.getElementById('inputBlue2').value;
  
  document.getElementById('red1').textContent = r1;
  document.getElementById('red2').textContent = r2;
  document.getElementById('blue1').textContent = b1;
  document.getElementById('blue2').textContent = b2;
  
  if (show) {
    document.getElementById('redTeamsDisp').classList.add('visible');
    document.getElementById('blueTeamsDisp').classList.add('visible');
  } else {
    document.getElementById('redTeamsDisp').classList.remove('visible');
    document.getElementById('blueTeamsDisp').classList.remove('visible');
  }
  closeTeamModal();
}

const es = new EventSource('/events');
es.onmessage = function(e) {
  const d = JSON.parse(e.data);
  document.getElementById('blueScore').textContent = d.blue_hw;
  document.getElementById('redScore').textContent  = d.red_hw;
  document.getElementById('blueBottom').textContent = d.blue_hw;
  document.getElementById('redBottom').textContent  = d.red_hw;

  const m = Math.floor(d.timer_seconds / 60);
  const s = d.timer_seconds % 60;
  const tStr = m + ':' + String(s).padStart(2, '0');
  document.getElementById('timer').textContent = tStr;
  document.getElementById('timerSmall').textContent = tStr;
  document.getElementById('timer').classList.toggle('danger', d.timer_seconds <= 30 && d.timer_started);
};

function post(url, body) { return fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body || {}) }); }
function timerStart() { post('/api/timer/start'); }
function timerPause() { post('/api/timer/pause'); }
function timerReset() { post('/api/timer/reset'); }
function resetAll()   { post('/api/reset'); }
function adj(side, action) { post('/api/score/adjust', {side, action}); }
</script>
</body>
</html>
