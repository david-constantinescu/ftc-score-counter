<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DECODE Goal Scorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;background:#0f0f23;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}

/* ── Top bar ───────────────────────────────────── */
.top{display:flex;align-items:center;gap:12px;padding:8px 16px;background:#1a1a2e;border-bottom:1px solid #333;flex-wrap:wrap}
.top h1{font-size:16px;color:#ffd740;white-space:nowrap}
.spacer{flex:1}
.timer{font-size:42px;font-weight:bold;color:#ffd740;font-variant-numeric:tabular-nums;min-width:120px;text-align:center;background:#0f0f23;border:2px groove #555;border-radius:8px;padding:2px 14px;line-height:1.15}
.timer.danger{color:#ff1744}
button{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s}
button:hover{opacity:.85}
button:active{opacity:.7}
.b-start{background:#4caf50;color:#fff}
.b-pause{background:#ff9800;color:#fff}
.b-reset{background:#616161;color:#fff}
.b-danger{background:#e53935;color:#fff}
.b-blue{background:#42a5f5;color:#fff}
.b-red{background:#ef5350;color:#fff}
.b-sm{padding:5px 10px;font-size:12px}

/* ── Main panels ───────────────────────────────── */
.main{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;flex:1;min-height:0}
.panel{background:#1a1a2e;border-radius:10px;overflow:hidden;border:2px solid #333;display:flex;flex-direction:column}
.panel.blue{border-color:#42a5f5}
.panel.red{border-color:#ef5350}
.panel-hdr{text-align:center;padding:5px;font-weight:bold;font-size:13px;letter-spacing:2px}
.panel.blue .panel-hdr{background:#42a5f522;color:#42a5f5}
.panel.red  .panel-hdr{background:#ef535022;color:#ef5350}
.vid{position:relative;background:#000;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.vid img{width:100%;height:100%;object-fit:fill}
.score-area{text-align:center;padding:6px 0}
.score{font-size:64px;font-weight:bold;line-height:1}
.panel.blue .score{color:#42a5f5}
.panel.red  .score{color:#ef5350}
.score-info{font-size:12px;opacity:.65;margin-top:2px}
.score-btns{display:flex;gap:6px;justify-content:center;padding:6px 0 8px}

/* ── Camera controls ───────────────────────────── */
.cam-bar{display:flex;align-items:center;gap:8px;padding:6px 16px;background:#151528;border-top:1px solid #222;font-size:12px;flex-wrap:wrap}
.cam-bar label{font-weight:600}
.cam-bar select{padding:4px 8px;border-radius:4px;border:1px solid #555;background:#1a1a2e;color:#e0e0e0;font-size:12px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:border-color .15s}
.cam-bar select:focus{border-color:#42a5f5;outline:none}
.cam-bar select:disabled{opacity:.5;cursor:wait}

/* ── Status bar ────────────────────────────────── */
.status-bar{display:flex;align-items:center;gap:8px;padding:5px 16px;background:#1a1a2e;border-top:1px solid #333;font-size:11px}
.dot{width:9px;height:9px;border-radius:50%;background:gray;flex-shrink:0}
.dot.ok{background:#4caf50}
.dot.err{background:#e53935}
.status-txt{flex:1;color:gray}
.fps-txt{color:gray;white-space:nowrap}

@media(max-width:700px){
  .main{grid-template-columns:1fr}
  .timer{font-size:32px;min-width:90px}
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="top">
  <h1>DECODE Goal Scorer</h1>
  <div class="spacer"></div>
  <div class="timer" id="timer">2:30</div>
  <button class="b-start" id="btnStart" onclick="timerStart()">Start</button>
  <button class="b-pause" onclick="timerPause()">Pause</button>
  <button class="b-reset b-sm" onclick="timerReset()">Reset Timer</button>
  <button class="b-danger b-sm" onclick="resetAll()">Reset All</button>
</div>

<!-- Main area -->
<div class="main">
  <!-- Blue -->
  <div class="panel blue">
    <div class="panel-hdr">BLUE GOAL</div>
    <div class="vid"><img id="blueStream" src="/stream/blue" alt="Blue"></div>
    <div class="score-area">
      <div class="score" id="blueScore">0</div>
      <div class="score-info" id="blueInfo">balls scored &nbsp;|&nbsp; live: 0</div>
    </div>
    <div class="score-btns">
      <button class="b-blue b-sm" onclick="adj('blue','plus')">+1</button>
      <button class="b-blue b-sm" onclick="adj('blue','minus')">-1</button>
      <button class="b-reset b-sm" onclick="adj('blue','clear')">Clear</button>
    </div>
  </div>
  <!-- Red -->
  <div class="panel red">
    <div class="panel-hdr">RED GOAL</div>
    <div class="vid"><img id="redStream" src="/stream/red" alt="Red"></div>
    <div class="score-area">
      <div class="score" id="redScore">0</div>
      <div class="score-info" id="redInfo">balls scored &nbsp;|&nbsp; live: 0</div>
    </div>
    <div class="score-btns">
      <button class="b-red b-sm" onclick="adj('red','plus')">+1</button>
      <button class="b-red b-sm" onclick="adj('red','minus')">-1</button>
      <button class="b-reset b-sm" onclick="adj('red','clear')">Clear</button>
    </div>
  </div>
</div>

<!-- Camera selector -->
<div class="cam-bar">
  <label style="color:#42a5f5">Blue Cam:</label>
  <select id="blueCam" onchange="setCam('blue')"><option value="none">None</option></select>
  <label style="color:#ef5350;margin-left:12px">Red Cam:</label>
  <select id="redCam" onchange="setCam('red')"><option value="none">None</option></select>
  <button class="b-reset b-sm" onclick="refreshCams()">Refresh Cameras</button>
</div>

<!-- Status -->
<div class="status-bar">
  <div class="dot" id="dot"></div>
  <span class="status-txt" id="statusTxt">Connecting…</span>
  <span class="fps-txt" id="fpsTxt"></span>
</div>

<!-- Hidden audio for FTC timer (plays on CLIENT) -->
<audio id="timerAudio" preload="auto">
  <source src="/static/ftctimer.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById('timerAudio');
let lastAudioSeq = 0;
let audioUnlocked = false;

/* ── SSE: real-time state from server ─────────── */
const es = new EventSource('/events');
es.onmessage = function(e) {
  const d = JSON.parse(e.data);

  // Scores
  document.getElementById('blueScore').textContent = d.blue_hw;
  document.getElementById('redScore').textContent  = d.red_hw;
  document.getElementById('blueInfo').innerHTML =
    'balls scored &nbsp;|&nbsp; live: ' + d.blue_live;
  document.getElementById('redInfo').innerHTML =
    'balls scored &nbsp;|&nbsp; live: ' + d.red_live;

  // Timer
  const m = Math.floor(d.timer_seconds / 60);
  const s = d.timer_seconds % 60;
  const tEl = document.getElementById('timer');
  tEl.textContent = m + ':' + String(s).padStart(2, '0');
  tEl.classList.toggle('danger', d.timer_seconds <= 30 && d.timer_started);

  // Status
  const dot = document.getElementById('dot');
  dot.className = 'dot ' + (d.status_ok ? 'ok' : 'err');
  document.getElementById('statusTxt').textContent = d.status;
  document.getElementById('fpsTxt').textContent =
    'Inference: ' + d.infer_fps + ' FPS  [' + d.device.toUpperCase() + ']';

  // Audio commands (sequence-based so we never double-fire)
  if (d.audio_seq > lastAudioSeq) {
    lastAudioSeq = d.audio_seq;
    handleAudio(d.audio_cmd);
  }
};
es.onerror = function() {
  document.getElementById('dot').className = 'dot err';
  document.getElementById('statusTxt').textContent = 'Connection lost — retrying…';
};

/* ── Audio management ─────────────────────────── */
function handleAudio(cmd) {
  if (!cmd) return;
  switch (cmd) {
    case 'play':  audio.currentTime = 0; audio.play().catch(()=>{}); break;
    case 'pause': audio.pause(); break;
    case 'resume': audio.play().catch(()=>{}); break;
    case 'stop':  audio.pause(); audio.currentTime = 0; break;
  }
}

/* Unlock audio on first user gesture (browser autoplay policy) */
function unlockAudio() {
  if (audioUnlocked) return;
  const p = audio.play();
  if (p) p.then(()=>{ audio.pause(); audio.currentTime=0; audioUnlocked=true; }).catch(()=>{});
}

/* ── API helpers ──────────────────────────────── */
function post(url, body) {
  unlockAudio();
  return fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body || {})
  });
}

function timerStart() { post('/api/timer/start'); }
function timerPause() { post('/api/timer/pause'); }
function timerReset() { post('/api/timer/reset'); }
function resetAll()   { post('/api/reset'); }
function adj(side, action) { post('/api/score/adjust', {side, action}); }

function setCam(side) {
  const sel = document.getElementById(side==='blue'?'blueCam':'redCam');
  post('/api/camera/' + side, {src: sel.value}).then(() => {
    const img = document.getElementById(side + 'Stream');
    if (img) {
      img.src = '/stream/' + side + '?t=' + new Date().getTime();
    }
  });
}

function refreshCams() {
  const blueS = document.getElementById('blueCam');
  const redS = document.getElementById('redCam');
  blueS.disabled = true; redS.disabled = true;
  fetch('/api/cameras').then(r=>r.json()).then(cams => {
    ['blue','red'].forEach(side => {
      const sel = side==='blue' ? blueS : redS;
      const cur = sel.value;
      sel.innerHTML = '<option value="none">None</option>';
      cams.forEach(c => {
        const o = document.createElement('option');
        o.value = c.id;
        o.textContent = c.name.length > 35 ? c.name.slice(0,32) + '…' : c.name;
        o.title = c.name;
        sel.appendChild(o);
      });
      if ([...sel.options].some(o => o.value == cur)) sel.value = cur;
      sel.disabled = false;
    });
  }).catch(() => { blueS.disabled = false; redS.disabled = false; });
}

/* Reconnect MJPEG streams on error */
function monitorStream(id, url) {
  const img = document.getElementById(id);
  img.onerror = function() {
    setTimeout(()=>{ img.src = url + '?t=' + Date.now(); }, 2000);
  };
}
monitorStream('blueStream', '/stream/blue');
monitorStream('redStream',  '/stream/red');

// Load camera list on page load
refreshCams();
</script>
</body>
</html>
