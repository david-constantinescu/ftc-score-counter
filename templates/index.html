<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTC Score Counter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Top Controls */
        .top-controls {
            height: 100px;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding: 0 20px;
        }

        .top-controls button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .start-btn {
            background-color: #4CAF50;
            color: white;
            font-size: 18px;
            padding: 12px 28px;
        }

        .reset-btn {
            background-color: #f44336;
            color: white;
        }

        .settings-btn {
            background-color: #FF9800;
            color: white;
        }

        /* Timer Area */
        .timer-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #timer {
            font-size: 15rem;
            font-weight: bold;
            color: white;
        }

        /* Bottom Teams */
        .bottom-teams {
            height: 200px;
            display: flex;
            border-top: 2px solid rgba(255, 255, 255, 0.2);
        }

        .team-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .team-content {
            padding: 20px;
        }

        .team-numbers {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        #team-numbers-red {
            background-color: #f44336;
        }

        #team-numbers-blue {
            background-color: #2196F3;
        }

        /* Scores */
        .scores {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
        }

        #red-score {
            color: #f44336;
        }

        #blue-score {
            color: #2196F3;
        }

        /* Settings Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
        }

        .modal-content h2 {
            margin-bottom: 15px;
        }

        .settings-group {
            margin-bottom: 15px;
        }

        .settings-group label {
            display: block;
            margin-bottom: 5px;
        }

        .settings-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #555;
            border-radius: 4px;
            background-color: #444;
            color: white;
        }

        .settings-group input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .modal-buttons button:hover {
            opacity: 0.8;
        }

        .save-btn {
            background-color: #4CAF50;
            color: white;
        }

        .cancel-btn {
            background-color: #f44336;
            color: white;
        }

        /* Hide elements when teams are not shown */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Controls -->
        <div class="top-controls">
            <button class="start-btn" id="start-btn">Start Match</button>
            <button class="reset-btn" id="reset-btn">Reset Match</button>
            <button class="settings-btn" id="settings-btn">Settings</button>
        </div>

        <!-- Timer Area -->
        <div class="timer-container">
            <div id="timer">2:30</div>
        </div>

        <!-- Bottom Teams -->
        <div class="bottom-teams">
            <div class="team-section" id="team-numbers-red">
                <div class="team-content">
                    <div class="team-numbers" id="red-teams">1234<br>5678</div>
                </div>
            </div>
            <div class="team-section scores">
                <div id="red-score">0</div>
            </div>
            <div class="team-section scores">
                <div id="blue-score">0</div>
            </div>
            <div class="team-section" id="team-numbers-blue">
                <div class="team-content">
                    <div class="team-numbers" id="blue-teams">9012<br>3456</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="settings-group">
                <label for="red-team-1">Red Team 1:</label>
                <input type="text" id="red-team-1" value="1234">
            </div>
            <div class="settings-group">
                <label for="red-team-2">Red Team 2:</label>
                <input type="text" id="red-team-2" value="5678">
            </div>
            <div class="settings-group">
                <label for="blue-team-1">Blue Team 1:</label>
                <input type="text" id="blue-team-1" value="9012">
            </div>
            <div class="settings-group">
                <label for="blue-team-2">Blue Team 2:</label>
                <input type="text" id="blue-team-2" value="3456">
            </div>
            <div class="settings-group">
                <label for="show-teams">Show Teams:</label>
                <input type="checkbox" id="show-teams" checked>
            </div>
            <div class="modal-buttons">
                <button class="save-btn" id="save-settings">Save</button>
                <button class="cancel-btn" id="cancel-settings">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Timer functionality
        let timerInterval;
        let timeLeft = 150; // 2:30 in seconds
        let audioUnlocked = false;

        const timerElement = document.getElementById('timer');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const modal = document.getElementById('settings-modal');
        const saveSettingsBtn = document.getElementById('save-settings');
        const cancelSettingsBtn = document.getElementById('cancel-settings');
        const showTeamsCheckbox = document.getElementById('show-teams');
        const redTeamsElement = document.getElementById('red-teams');
        const blueTeamsElement = document.getElementById('blue-teams');
        const teamNumbersRedElement = document.getElementById('team-numbers-red');
        const teamNumbersBlueElement = document.getElementById('team-numbers-blue');

        // Initialize
        updateTimer();
        applyTeamsVisibility(false);

        // Timer functions
        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (!audioUnlocked) {
                unlockAudio();
            }
            
            if (timerInterval) return; // Timer already running
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimer();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    handleAudio('stop');
                } else if (timeLeft <= 30) {
                    handleAudio('play');
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            timeLeft = 150;
            updateTimer();
            handleAudio('stop');
        }

        // Audio functionality
        function unlockAudio() {
            // Create a temporary audio element to unlock audio
            const tempAudio = new Audio();
            tempAudio.play().then(() => {
                audioUnlocked = true;
            }).catch(() => {
                // Auto-play might be blocked, user interaction needed
                console.log('Audio locked');
            });
        }

        function handleAudio(action) {
            // This is a mock function to simulate audio
            console.log(`Audio ${action}`);
        }

        // Teams functionality
        function applyTeamsVisibility(show) {
            if (show) {
                teamNumbersRedElement.classList.remove('hidden');
                teamNumbersBlueElement.classList.remove('hidden');
                updateTeamNumbers();
            } else {
                teamNumbersRedElement.classList.add('hidden');
                teamNumbersBlueElement.classList.add('hidden');
            }
        }

        function updateTeamNumbers() {
            const redTeam1 = document.getElementById('red-team-1').value;
            const redTeam2 = document.getElementById('red-team-2').value;
            const blueTeam1 = document.getElementById('blue-team-1').value;
            const blueTeam2 = document.getElementById('blue-team-2').value;
            
            redTeamsElement.textContent = `${redTeam1}\n${redTeam2}`;
            blueTeamsElement.textContent = `${blueTeam1}\n${blueTeam2}`;
        }

        // Modal functions
        function openModal() {
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // Event listeners
        startBtn.addEventListener('click', startTimer);
        resetBtn.addEventListener('click', resetTimer);
        settingsBtn.addEventListener('click', openModal);
        cancelSettingsBtn.addEventListener('click', closeModal);
        saveSettingsBtn.addEventListener('click', () => {
            applyTeamsVisibility(showTeamsCheckbox.checked);
            closeModal();
        });
        showTeamsCheckbox.addEventListener('change', (e) => {
            applyTeamsVisibility(e.target.checked);
        });

        // Close modal when clicking outside
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
